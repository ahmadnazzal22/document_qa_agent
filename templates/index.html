<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocAI — مساعد المستندات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0d0d14;
            --surface2: #13131e;
            --border: rgba(255,255,255,0.06);
            --accent1: #6d28d9;
            --accent2: #2563eb;
            --accent3: #7c3aed;
            --text: #e2e8f0;
            --muted: #475569;
            --green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background */
        .bg-effects {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: float 8s ease-in-out infinite;
        }

        .orb1 {
            width: 500px; height: 500px;
            background: var(--accent1);
            top: -150px; right: -100px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 400px; height: 400px;
            background: var(--accent2);
            bottom: -100px; left: -100px;
            animation-delay: 3s;
        }

        .orb3 {
            width: 300px; height: 300px;
            background: #ec4899;
            top: 50%; left: 30%;
            animation-delay: 5s;
            opacity: 0.06;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -20px) scale(1.05); }
            66% { transform: translate(-15px, 15px) scale(0.95); }
        }

        /* Grid lines */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Layout */
        .app {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background: rgba(13,13,20,0.8);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 28px 20px;
            gap: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .brand-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(109,40,217,0.4);
        }

        .brand-text h2 {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text p {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 1px;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .drop-zone {
            border: 1.5px dashed rgba(109,40,217,0.35);
            border-radius: 14px;
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(109,40,217,0.03);
            position: relative;
            overflow: hidden;
        }

        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(109,40,217,0.08), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .drop-zone:hover {
            border-color: var(--accent1);
            transform: translateY(-2px);
        }

        .drop-zone:hover::before { opacity: 1; }

        .drop-zone input { display: none; }

        .drop-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 0 10px rgba(109,40,217,0.5));
        }

        .drop-zone p {
            font-size: 0.88rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .drop-zone span {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 4px;
            display: block;
        }

        #fileName {
            font-size: 0.78rem;
            color: #a78bfa;
            margin-top: 10px;
            padding: 6px 10px;
            background: rgba(109,40,217,0.1);
            border-radius: 8px;
            display: none;
            word-break: break-all;
        }

        .btn-upload {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 14px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-upload::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(109,40,217,0.4); }
        .btn-upload:hover::after { opacity: 1; }

        #status {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 10px;
            min-height: 16px;
            padding: 6px;
            border-radius: 8px;
        }

        .status-ok {
            color: var(--green);
            background: rgba(16,185,129,0.08);
        }

        .status-loading {
            color: #fbbf24;
            background: rgba(251,191,36,0.08);
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: auto;
        }

        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-card .num {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .lbl {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 2px;
        }

        /* Main chat */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(13,13,20,0.5);
            backdrop-filter: blur(10px);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--green); }
            50% { opacity: 0.6; box-shadow: 0 0 4px var(--green); }
        }

        .chat-header h1 {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
        }

        .chat-header p {
            font-size: 0.78rem;
            color: var(--muted);
        }

        .badge {
            padding: 5px 12px;
            background: rgba(109,40,217,0.15);
            border: 1px solid rgba(109,40,217,0.3);
            border-radius: 20px;
            font-size: 0.72rem;
            color: #a78bfa;
            font-weight: 600;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: rgba(109,40,217,0.3); border-radius: 2px; }

        /* Welcome screen */
        .welcome {
            margin: auto;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            display: block;
            filter: drop-shadow(0 0 20px rgba(109,40,217,0.6));
            animation: float 4s ease-in-out infinite;
        }

        .welcome h2 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #a78bfa);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 0%; }
            100% { background-position: 200%; }
        }

        .welcome p {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
        }

        .suggestion {
            padding: 8px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
        }

        .suggestion:hover {
            border-color: rgba(109,40,217,0.4);
            color: #a78bfa;
            background: rgba(109,40,217,0.08);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Messages */
        .msg-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        .msg-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .avatar.user-av {
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            box-shadow: 0 4px 12px rgba(109,40,217,0.3);
        }

        .avatar.bot-av {
            background: var(--surface2);
            border: 1px solid var(--border);
        }

        .bubble {
            max-width: 68%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.93rem;
            line-height: 1.85;
        }

        .bubble.user {
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: white;
            border-top-left-radius: 4px;
            box-shadow: 0 4px 20px rgba(109,40,217,0.25);
        }

        .bubble.bot {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-top-right-radius: 4px;
        }

        .bubble.bot h4 {
            color: #a78bfa;
            font-size: 0.95rem;
            margin: 10px 0 5px;
            font-weight: 700;
        }

        .bubble.bot strong { color: #fff; }

        /* Typing */
        .typing-bubble {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-top-right-radius: 4px;
            padding: 16px 20px;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .typing-bubble span {
            width: 7px; height: 7px;
            background: var(--accent1);
            border-radius: 50%;
            animation: bounce 1.3s infinite;
        }

        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; background: #8b5cf6; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; background: var(--accent2); }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-7px); }
        }

        /* Input area */
        .input-area {
            padding: 20px 32px;
            border-top: 1px solid var(--border);
            background: rgba(13,13,20,0.6);
            backdrop-filter: blur(10px);
        }

        .input-wrap {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 8px 8px 8px 16px;
            transition: border 0.3s;
        }

        .input-wrap:focus-within {
            border-color: rgba(109,40,217,0.5);
            box-shadow: 0 0 0 3px rgba(109,40,217,0.08);
        }

        .input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }

        .input-wrap input::placeholder { color: var(--muted); }

        .btn-send {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(109,40,217,0.4);
        }

        .input-hint {
            font-size: 0.72rem;
            color: var(--muted);
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="bg-effects">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
</div>
<div class="grid-overlay"></div>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <div class="brand-icon">📄</div>
            <div class="brand-text">
                <h2>DocAI Agent</h2>
                <p>Powered by Groq + LLaMA</p>
            </div>
        </div>

        <div>
            <div class="section-label">رفع الملف</div>
            <div class="drop-zone" onclick="document.getElementById('pdfFile').click()">
                <span class="drop-icon">📂</span>
                <p>اضغط لرفع ملف PDF</p>
                <span>يدعم PDF فقط — حتى 50MB</span>
                <input type="file" id="pdfFile" accept=".pdf" onchange="showFileName()">
            </div>
            <div id="fileName"></div>
            <button class="btn-upload" onclick="uploadPDF()">⬆️ &nbsp; رفع وتحليل الملف</button>
            <div id="status"></div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="num" id="chunkCount">0</div>
                <div class="lbl">مقطع نصي</div>
            </div>
            <div class="stat-card">
                <div class="num" id="msgCount">0</div>
                <div class="lbl">سؤال</div>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="status-dot"></div>
                <div>
                    <h1>مساعد المستندات الذكي</h1>
                    <p>اسأل أي سؤال عن ملفك</p>
                </div>
            </div>
            <div class="badge">🤖 LLaMA 3.3</div>
        </div>

        <div id="chat">
            <div class="welcome" id="welcome">
                <span class="welcome-icon">✨</span>
                <h2>مرحباً بك في DocAI</h2>
                <p>ارفع ملف PDF من الجانب وابدأ الأسئلة</p>
                <div class="suggestions">
                    <div class="suggestion" onclick="fillQ('ما الموضوع الرئيسي للملف؟')">ما الموضوع الرئيسي؟</div>
                    <div class="suggestion" onclick="fillQ('لخص الملف بنقاط')">لخص الملف</div>
                    <div class="suggestion" onclick="fillQ('ما أهم المعلومات في الملف؟')">أهم المعلومات</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="question" placeholder="اكتب سؤالك هنا...">
                <button class="btn-send" onclick="askQuestion()">➤</button>
            </div>
            <div class="input-hint">اضغط Enter للإرسال</div>
        </div>
    </div>

</div>

<script>
    let msgCount = 0;

    function fillQ(text) {
        document.getElementById('question').value = text;
        document.getElementById('question').focus();
    }

    function showFileName() {
        const file = document.getElementById('pdfFile').files[0];
        if (file) {
            const el = document.getElementById('fileName');
            el.style.display = 'block';
            el.innerText = '📄 ' + file.name;
        }
    }

    async function uploadPDF() {
        const file = document.getElementById('pdfFile').files[0];
        if (!file) { alert('اختر ملف أول'); return; }

        const status = document.getElementById('status');
        status.className = 'status-loading';
        status.innerText = '⏳ جاري التحليل...';

        const formData = new FormData();
        formData.append('pdf', file);

        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        status.className = 'status-ok';
        status.innerText = data.message;

        const match = data.message.match(/\d+/);
        if (match) document.getElementById('chunkCount').innerText = match[0];
    }

    function formatText(text) {
        return text
            .replace(/### (.+)/g, '<h4>$1</h4>')
            .replace(/## (.+)/g, '<h4>$1</h4>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/^\d+\.\s/gm, (m) => `<br>${m}`)
            .replace(/^[-•]\s/gm, (m) => `<br>• `)
            .replace(/\n/g, '<br>');
    }

    async function askQuestion() {
        const input = document.getElementById('question');
        const q = input.value.trim();
        if (!q) return;

        const chat = document.getElementById('chat');
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        msgCount++;
        document.getElementById('msgCount').innerText = msgCount;

        chat.innerHTML += `
            <div class="msg-row user">
                <div class="avatar user-av">👤</div>
                <div class="bubble user">${q}</div>
            </div>`;

        input.value = '';
        chat.scrollTop = chat.scrollHeight;

        const typingId = 'typing-' + Date.now();
        chat.innerHTML += `
            <div class="msg-row" id="${typingId}">
                <div class="avatar bot-av">🤖</div>
                <div class="typing-bubble">
                    <span></span><span></span><span></span>
                </div>
            </div>`;
        chat.scrollTop = chat.scrollHeight;

        const res = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q })
        });
        const data = await res.json();

        document.getElementById(typingId)?.remove();

        chat.innerHTML += `
            <div class="msg-row">
                <div class="avatar bot-av">🤖</div>
                <div class="bubble bot">${formatText(data.answer)}</div>
            </div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('question').addEventListener('keypress', e => {
        if (e.key === 'Enter') askQuestion();
    });
</script>
</body>
</html>
